name: formula-audit

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/formula-audit.yml'
  pull_request:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: brew audit --strict
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          repository: kyungw00k/homebrew-tap
          ref: main
          path: tap
      - uses: Homebrew/actions/setup-homebrew@master
      - name: link tap into Homebrew Library
        run: |
          REPO_DIR="$(brew --repository)/Library/Taps/kyungw00k"
          mkdir -p "$REPO_DIR"
          ln -s "$GITHUB_WORKSPACE/tap" "$REPO_DIR/homebrew-tap"
      - name: brew trust tap
        run: brew trust kyungw00k/tap
      - name: brew audit --strict --online
        env:
          HOMEBREW_NO_INSTALL_FROM_API: '1'
        run: brew audit --strict --online proxytap
