name: formula-audit

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/formula-audit.yml'
  pull_request:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: brew audit --strict
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          repository: kyungw00k/homebrew-tap
          ref: main
          path: tap
      - uses: Homebrew/actions/setup-homebrew@master
      - name: brew style
        working-directory: tap
        run: brew style ./proxytap.rb
      - name: brew audit --strict --online
        working-directory: tap
        env:
          HOMEBREW_NO_INSTALL_FROM_API: '1'
        run: |
          # tap-local formulae commonly hit Sorbet sigil and BlockMethodDefinition
          # cops because the on_macos/on_intel/on_arm install-dispatch pattern is
          # idiomatic for pre-built-binary taps but not for homebrew/core. We scope
          # the audit to actual correctness checks (URL, sha256, livecheck, etc).
          brew audit --strict --online \
            --except=sorbet,style \
            ./proxytap.rb
