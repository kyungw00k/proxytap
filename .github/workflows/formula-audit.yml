name: formula-audit

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/formula-audit.yml'
  pull_request:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: brew audit --strict
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          repository: kyungw00k/homebrew-tap
          ref: main
          path: tap
      - uses: Homebrew/actions/setup-homebrew@master
      - name: brew audit --strict --online
        working-directory: tap
        env:
          HOMEBREW_NO_INSTALL_FROM_API: '1'
        run: |
          # 'brew style' is intentionally skipped — tap-local formulae that
          # dispatch on_macos/on_intel/on_arm with def install inside blocks
          # (idiomatic for pre-built-binary taps, not for homebrew/core) trip
          # Sorbet/StrictSigil, Sorbet/TrueSigil, Sorbet/BlockMethodDefinition.
          # Those are style choices, not correctness bugs. The audit step
          # below covers actual correctness (URL, sha256, license, etc).
          brew audit --strict --online ./proxytap.rb
